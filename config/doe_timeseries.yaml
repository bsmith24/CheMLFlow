# ======================================================================
# DOE spec for the time-series Adaptive NVAR pipeline.
#
# DOE cases here are SCIENTIFICALLY DISTINCT EXPERIMENTS (different
# measurement-noise levels, different training-time noise levels, etc.).
# Hyperparameter candidates (k, hidden_dim, lr_adam, lr_lbfgs) are expanded
# as DOE parent cases via model_search. Runtime child configs stay fixed.
#
# Generate concrete case configs:
#   python scripts/generate_doe.py --doe config/doe_timeseries.yaml
# ======================================================================

dataset:
  name: mackey_glass
  profile: ts_forecast
  task_type: regression
  source:
    type: local_npy
    path: data/ground_truth.npy
    time_axis: cols
  split:
    warmup_len: 500
    train_len: 7500
    val_len: 1000
    test_len: 1000

defaults:
  global.task_type: regression
  global.random_state: 2025
  global.base_dir: artifacts/data/doe_timeseries
  pipeline.feature_input: none
  train.tuning.method: fixed
  train.model.type: dl_adaptive_nvar
  # Reasonable defaults; model_search emits concrete values for searched axes
  # (k, hidden_dim, lr_adam, lr_lbfgs).
  train.model.params.weight_decay: 0.0
  train.model.params.num_windows: 10
  train.model.params.horizons: [25, 50, 75, 100]
  train.model.params.test_num_runs: 25       # final independent test trainings; report mean ± std
  train.model.params.adam_patience: 200
  train.model.params.lbfgs_patience: 200
  train.model.params.max_epochs_adam: 5000      # final-retrain budget
  train.model.params.num_epochs_lbfgs: 50000    # final-retrain budget
  # Device selection. "cuda" is strict: the job fails fast if the env did
  # not actually allocate a GPU (CUDA not available, CUDA-less PyTorch, no
  # nodes with --gpus=1, etc.). Set to "auto" to fall back to CPU silently,
  # or "cpu" to force CPU even on GPU nodes.
  train.model.params.device: cuda

# Scientific factors: each combination produces a distinct experiment.
#   - dataset_noise_scale: measurement noise added globally (clean vs 1% vs 5%).
#   - train_noise_scale:   training-time perturbation on the train segment.
search_space:
  # train.model.params.dataset_noise_scale: [0.0, 0.1, 0.2, 0.3]
  train.model.params.dataset_noise_scale: [0.2, 0.3]
  # train.model.params.train_noise_scale: [0.0, 0.05]
  train.model.params.train_noise_scale: [0.0]

model_search:
  dl_adaptive_nvar:
    method: optuna
    n_trials: 80
    seed: 2025
    params:
      k: {type: categorical, choices: [2, 10, 30, 50]}
      hidden_dim: {type: categorical, choices: [10, 20, 50, 100, 200, 500, 1000]}
      lr_adam: {type: categorical, choices: [1.0e-4, 1.0e-3, 1.0e-2]}
      lr_lbfgs: {type: categorical, choices: [1.0, 0.5, 0.1]}

selection:
  max_cases: null

output:
  dir: doe/timeseries
